name: piscoot
description: PiScoot - The Railway Scooter Fleet Management App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.3.4
  http: ^1.2.0
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  web_socket_channel: ^2.4.0
  fl_chart: ^1.2.0
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  latlong2: ^0.9.0
  flutter_map: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
